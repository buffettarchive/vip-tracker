<style>

  }

  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:0 20px}

  header.mast{border-bottom:2px solid var(--ink);padding:44px 0 0;}
  .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:16px;}
  h1.title{font-family:"Chomsky",serif;font-weight:400;font-size:clamp(44px,9vw,76px);line-height:1.08;letter-spacing:.06em;color:#d8d5cc;-webkit-text-stroke:0.6px var(--paper);text-stroke:0.6px var(--paper);}
  .meta-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:20px;font-size:12.5px;color:var(--ink-soft);}
  .meta-row .langtoggle{margin-left:auto;}
  .live{display:inline-flex;align-items:center;gap:6px;color:var(--live);font-weight:600}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%{opacity:1;box-shadow:0 0 0 0 rgba(214,58,46,.5)}70%{opacity:.55;box-shadow:0 0 0 5px rgba(214,58,46,0)}100%{opacity:1;box-shadow:0 0 0 0 rgba(214,58,46,0)}}

  /* 상단 큰 탭 */
  .maintabs{display:flex;gap:0;margin-top:26px;}
  .maintabs button{
    font-family:inherit;font-size:15px;font-weight:600;
    background:transparent;border:none;border-bottom:2px solid transparent;
    color:var(--ink-soft);padding:12px 4px;margin-right:28px;cursor:pointer;
    transform:translateY(2px);transition:.15s;

  .maintabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--ink);}

  .langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-size:11px;font-weight:600;letter-spacing:.05em}
  .langtoggle button{font-family:inherit;background:transparent;border:0;color:var(--ink-soft);padding:4px 10px;cursor:pointer;transition:.15s;}
  .langtoggle button[aria-selected="true"]{background:var(--ink);color:var(--paper)}
  .market-filter{display:flex;gap:6px}
  .market-filter button{font-family:inherit;font-size:13px;font-weight:600;background:transparent;border:1px solid var(--line);color:var(--ink-soft);padding:7px 14px;border-radius:999px;cursor:pointer;transition:.15s;}
  .market-filter button[aria-selected="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .controls{display:flex;align-items:center;padding:20px 0;flex-wrap:wrap;gap:12px;}
  .firm-tabs{display:flex;gap:6px;flex-wrap:wrap}

  .feed{list-style:none;border-top:1px solid var(--ink)}
  .row{display:grid;grid-template-columns:88px 1fr auto;gap:18px;align-items:center;
    padding:20px 4px;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
    transition:background .15s,padding-left .15s;}
  .row:hover{background:var(--paper-2);padding-left:10px}
  .row.dim{opacity:.4}
  .date{font-size:13px;color:var(--ink-soft);line-height:1.25;}
  .date .y{display:block;font-size:11px;opacity:.7}
  .corp{min-width:0}
  .corp .name{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .corp .name .code{font-size:12px;color:var(--ink-soft);font-weight:500;margin-left:7px}
  .corp .sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px}

  .stake{text-align:right;white-space:nowrap}

  .stake .held{font-size:10px;color:var(--ink-soft);letter-spacing:.04em;margin-top:2px}
  .stake .delta{font-size:12px;margin-top:4px;font-weight:600}
  .delta.buy{color:var(--up)} .delta.sell{color:var(--down)} .delta.etc{color:var(--ink-soft)}

  .badge.in{background:#163a28;color:#5fd197}
  .badge.out{background:#3a3320;color:#d4b876}
  .badge.big{background:#3d2420;color:#e89086}
  .badge.mkt-y{background:#1a2c44;color:#7fb0e8}
  .badge.mkt-k{background:#3a3320;color:#d4b876}
  .badge.bb-acq{background:#163a28;color:#5fd197}
  .badge.bb-cancel{background:#2a1a3a;color:#c89bef}

  .empty{padding:60px 0;text-align:center;color:var(--ink-soft);font-size:15px}
  footer{margin:36px 0 0;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);line-height:1.7;}
  .disclaim{margin-top:10px;font-size:11.5px;opacity:.9}
  .dtitle{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:10px}
  .dline{font-size:12px;color:var(--ink-soft);line-height:1.65;margin-bottom:7px}
  .contact{margin:14px 0 50px;font-size:12.5px;letter-spacing:.02em}
  .contact a{color:var(--ink);text-decoration:none;font-weight:700}
  .contact a:hover{border-bottom:1px solid var(--ink)}
  @media(max-width:560px){.row{grid-template-columns:58px 1fr auto;gap:12px}.corp .name{font-size:16px}.stake .pct{font-size:19px}.maintabs button{font-size:14px;margin-right:18px}}

<script>
const $ = s => document.querySelector(s);

// ── i18n 사전 ──────────────────────────────────────────────
const I18N = {
  ko: {
    title_html: "버핏아카이브 자산운용사 및 내부자매수 트래킹 사이트",
    live: "실시간 트래킹",
    tab_insider: "내부자 매수",
    tab_firm: "운용사 지분공시",
    tab_buyback: "자사주 매입/소각",
    all: "전체",
    market_all: "전체",
    count_insider: n => `${n}건의 내부자 매수`,
    count_firm: n => `${n}건의 공시`,
    count_buyback: n => `${n}건의 자사주 공시`,
    empty_insider: "표시할 내부자 매수가 없습니다.",
    empty_firm: "표시할 공시가 없습니다.",
    empty_buyback: "표시할 자사주 매입/소각 공시가 없습니다.",
    held_stake: "보유 지분",
    bought: "매수 주식수",
    hold: "보유",
    badge_in: "장내매수",
    badge_out: "장외매수",
    badge_aft: "시간외",
    seed: "예시 데이터",
    disclaim_title: "면책조항",
    disclaim_1: "5% 대량보유보고서 및 임원·주요주주 특정증권등 소유상황보고서는 보고의무발생일로부터 5영업일 이내 제출되므로, 표시내용은 실제 매매 시점보다 늦을 수 있습니다.",
    disclaim_2: "본 사이트는 공시 사실을 정리해 전달할 뿐이며, 특정 종목의 매수 및 매도를 권유하지 않습니다. 투자판단과 책임은 이용자 본인에게 있습니다.",
    business: "Business",
    kind_new: "매수 · 신규",
    kind_buy: "매수",
    kind_sell: "매도",
    kind_etc: "기타",
    bb_acq: "취득",
    bb_cancel: "소각",
    bb_shares: "취득 주식수",
    bb_shares_cancel: "소각 주식수",
    bb_amount: "취득 금액",
  },
  en: {
    title_html: "Buffett Archive — Korean Asset Managers & Insider Buying Tracker",
    live: "Live tracking",
    tab_insider: "Insider Buying",
    tab_firm: "Asset Manager Filings",
    tab_buyback: "Treasury Buybacks",
    all: "All",
    market_all: "All",
    count_insider: n => `${n} insider purchases`,
    count_firm: n => `${n} filings`,
    count_buyback: n => `${n} treasury stock filings`,
    empty_insider: "No insider purchases to display.",
    empty_firm: "No filings to display.",
    empty_buyback: "No treasury buyback or cancellation filings to display.",
    held_stake: "Held",
    bought: "Shares Bought",
    hold: "Hold",
    badge_in: "Open Market",
    badge_out: "Off-Market",
    badge_aft: "After-Hours",
    seed: "Sample Data",
    disclaim_title: "Disclaimer",
    disclaim_1: "5% block-holding reports and insider ownership reports are filed within 5 business days of the trigger event, so the displayed data may lag the actual transaction.",
    disclaim_2: "This site aggregates and presents public DART filings only. It does not solicit purchases or sales of any security. Investment decisions and consequences are the user's sole responsibility.",
    business: "Business",
    kind_new: "Buy · New",
    kind_buy: "Buy",
    kind_sell: "Sell",
    kind_etc: "Other",
    bb_acq: "Buyback",
    bb_cancel: "Cancellation",
    bb_shares: "Shares to acquire",
    bb_shares_cancel: "Shares to cancel",
    bb_amount: "Amount",
  }
};

// ── 한글 운용사명 → 영문 ──
const FIRM_EN = {
  "브이아이피자산운용": "VIP Asset Management",
  "얼라인파트너스자산운용": "Align Partners Capital Management",
  "라이프자산운용": "Life Asset Management",
  "에셋플러스자산운용": "Asset Plus Investment Management",
  "트러스톤자산운용": "Truston Asset Management",
};

// ── 한글 직위 → 영문 (부분일치 우선) ──
const ROLE_EN = [
  ["대표이사 회장","Chairman & CEO"],
  ["대표이사 사장","President & CEO"],
  ["대표이사","CEO"],
  ["부회장","Vice Chairman"],
  ["회장","Chairman"],
  ["사장","President"],
  ["부사장","Executive Vice President"],
  ["전무이사","Senior Managing Director"],
  ["전무","Senior Managing Director"],
  ["상무이사","Managing Director"],
  ["상무대우","Managing Director"],
  ["상무","Managing Director"],
  ["사내이사","Inside Director"],
  ["사외이사","Independent Director"],
  ["기타비상무이사","Non-Executive Director"],
  ["등기임원","Registered Officer"],
  ["비등기임원","Unregistered Officer"],
  ["사실상지배주주","De Facto Controlling Shareholder"],
  ["10%이상주주","10%+ Shareholder"],
  ["기획관리부문장","Head of Planning & Mgmt"],
  ["이사","Director"],
];

// ── 공시 사유(report_resn) 한글 → 영문 ──
const RESN_EN = [
  ["5%이상 보유 신규보고","New 5%+ Filing"],
  ["5% 이상 보유 신규보고","New 5%+ Filing"],
  ["1% 이상 변동","1%+ Change"],
  ["1%이상 변동","1%+ Change"],
  ["보유 목적 변경","Purpose Change"],
  ["보유목적변경","Purpose Change"],
];

function localizeFirm(name){ return LANG==="en" ? (FIRM_EN[name]||name) : name; }
function localizeRole(text){
  if(!text||text==="-") return text;
  if(LANG==="ko") return text;
  for(const [k,v] of ROLE_EN){ if(text.includes(k)) return text.replace(k,v); }
  return text;
}
function localizeResn(text){
  if(!text) return text;
  if(LANG==="ko") return text;
  for(const [k,v] of RESN_EN){ if(text===k||text.includes(k)) return v; }
  return text;
}
function t(key, ...args){
  const v = I18N[LANG][key];
  return typeof v==="function" ? v(...args) : v;
}

// 언어: 저장값 우선, 없으면 브라우저 언어가 ko면 한국어, 아니면 영어
let LANG = localStorage.getItem("ba_lang");
if(!LANG){
  const nav=(navigator.language||"").toLowerCase();
  LANG = nav.startsWith("ko") ? "ko" : "en";
}

function fmtDate(iso){
  if(!iso) return {d:"—",m:"",y:""};
  const [y,m,d] = iso.split("-");
  const months = LANG==="en"
    ? ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
    : ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const mon = months[parseInt(m)-1] || "";
  const dd = LANG==="en" ? `${parseInt(d)}` : `${parseInt(d)}일`;
  return {d:dd, m:mon, y};
}
function dartLink(rcept_no){
  if(!rcept_no || /^0+$/.test(rcept_no)) return null;
  return `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rcept_no}`;
}

/* ── 운용사(지분공시) 라벨 ── */
function firmTag(item){
  const cur=parseFloat(item.stkrt), prev=parseFloat(item.stkrt_prev);
  const diff=(!isNaN(cur)&&!isNaN(prev))?(cur-prev):null;
  const kind=item.kind||"";
  if(kind.includes("신규")) return {cls:"buy",txt:t("kind_new")};
  if(kind==="매수") return {cls:"buy",txt:diff!=null?`${t("kind_buy")} ▲${Math.abs(diff).toFixed(2)}%p`:t("kind_buy")};
  if(kind==="매도") return {cls:"sell",txt:diff!=null?`${t("kind_sell")} ▼${Math.abs(diff).toFixed(2)}%p`:t("kind_sell")};
  return {cls:"etc",txt:t("kind_etc")};
}

let FIRM={disclosures:[],firms:[]}, INSIDER={disclosures:[]}, BUYBACK={entries:[]};
let view="insider", activeFirm="전체", activeMarket="ALL", activeBBType="ALL";

function renderFirm(){
  const list=FIRM.disclosures
    .filter(x=>activeFirm==="전체"||x.firm===activeFirm)
    .sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=t("count_firm", list.length);
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">${t("empty_firm")}</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no), tag=firmTag(item);
    const code=item.stock_code?`<span class="code">${item.stock_code}</span>`:"";
    const firmName=localizeFirm(item.firm);
    const resn=localizeResn(item.report_resn||"")||"—";
    const dateBlock = LANG==="en"
      ? `<div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>`
      : `<div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>`;
    const inner=`
      ${dateBlock}
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub"><span class="who">${firmName}</span> · ${resn}</div>
      </div>
      <div class="stake">
        <div class="pct">${item.stkrt}%</div>
        <div class="held">${t("held_stake")}</div>
        <div class="delta ${tag.cls}">${tag.txt}</div>
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function renderInsider(){
  const list=INSIDER.disclosures
    .filter(x => activeMarket==="ALL" || (x.market||"")===activeMarket)
    .sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=t("count_insider", list.length);
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">${t("empty_insider")}</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no);
    const code=item.stock_code?`<span class="code">${item.stock_code}</span>`:"";
    // 시장 배지(코스피/코스닥)
    const mk=item.market||"";
    let mkb="";
    if(mk==="KOSPI") mkb=`<span class="badge mkt-y">KOSPI</span> `;
    else if(mk==="KOSDAQ") mkb=`<span class="badge mkt-k">KOSDAQ</span> `;
    // 취득방법 배지
    const m=item.method||"";
    let mb="";
    if(m.includes("장내")) mb=`<span class="badge in">${t("badge_in")}</span>`;
    else if(m.includes("장외")) mb=`<span class="badge out">${t("badge_out")}</span>`;
    else if(m.includes("시간외")) mb=`<span class="badge out">${t("badge_aft")}</span>`;
    // 직위/주요주주 표시 (영문화)
    const ofcpsLoc = localizeRole(item.ofcps||"");
    const mainLoc = (item.main_shrholdr && item.main_shrholdr!=="-")
                    ? localizeRole(item.main_shrholdr) : "";
    const pos=[ofcpsLoc, mainLoc].filter(Boolean).join(" · ");
    const inner=`
      <div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub">${mkb}<span class="who">${item.repror}</span> · ${pos||"—"} ${mb}</div>
      </div>
      <div class="stake">
        <div class="pct">+${item.irds_cnt}</div>
        <div class="held">${t("bought")}</div>
        <div class="delta buy">${t("hold")} ${item.hold_rate}%</div>
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function renderBuyback(){
  let list=BUYBACK.entries||[];
  // 시장 필터
  if(activeMarket!=="ALL"){
    const cls = activeMarket==="KOSPI"?"Y":"K";
    list = list.filter(x => x.corp_cls===cls);
  }
  // 유형 필터(취득/소각)
  if(activeBBType!=="ALL"){
    list = list.filter(x => x.type===activeBBType);
  }
  list.sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=t("count_buyback", list.length);
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">${t("empty_buyback")}</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no);
    const isAcq = item.type==="취득";
    // 유형 배지
    const typeBadge = isAcq
      ? `<span class="badge bb-acq">${t("bb_acq")}</span>`
      : `<span class="badge bb-cancel">${t("bb_cancel")}</span>`;
    // 시장 배지
    let mkb="";
    if(item.corp_cls==="Y") mkb=`<span class="badge mkt-y">KOSPI</span> `;
    else if(item.corp_cls==="K") mkb=`<span class="badge mkt-k">KOSDAQ</span> `;
    // 취득목적/방법 서브라인
    const purpose = item.acq_purpose || "";
    const method = item.acq_method || "";
    let subParts = [purpose, method].filter(Boolean);
    const sub = subParts.length ? subParts.join(" · ") : "—";
    // 주식수
    const shares = item.shares_common ? item.shares_common.toLocaleString() : "—";
    // 금액 (억 단위 변환)
    let amtLabel = "";
    if(item.amount_common){
      const billions = item.amount_common / 100000000;
      amtLabel = billions >= 1
        ? `${billions.toFixed(1)}${LANG==="en"?"B KRW":"억원"}`
        : `${(item.amount_common/10000).toFixed(0)}${LANG==="en"?"M KRW":"만원"}`;
    }
    const inner=`
      <div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>
      <div class="corp">
        <div class="name">${item.corp_name||"—"} ${typeBadge}</div>
        <div class="sub">${mkb}${sub}</div>
      </div>
      <div class="stake">
        <div class="pct">${shares}</div>
        <div class="held">${isAcq ? t("bb_shares") : t("bb_shares_cancel")}</div>
        ${amtLabel ? `<div class="delta buy">${amtLabel}</div>` : ""}
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function render(){
  if(view==="firm") renderFirm();
  else if(view==="buyback") renderBuyback();
  else renderInsider();
}

function buildFirmTabs(){
  if(view!=="firm"){ $("#firmTabs").innerHTML=""; $("#firmTabs").style.display="none"; return; }
  $("#firmTabs").style.display="flex";
  const firms=["전체",...(FIRM.firms||[])];
  $("#firmTabs").innerHTML=firms.map(f=>{
    const label = f==="전체" ? t("all") : localizeFirm(f);
    return `<button role="tab" aria-selected="${f===activeFirm}" data-firm="${f}">${label}</button>`;
  }).join("");
  $("#firmTabs").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{activeFirm=b.dataset.firm;buildFirmTabs();render();};
  });
}

function buildMarketFilter(){
  if(view==="firm"){ $("#marketFilter").innerHTML=""; $("#marketFilter").style.display="none"; return; }
  $("#marketFilter").style.display="flex";
  // 내부자 + 자사주 모두 시장 필터 사용
  const opts=[["ALL",t("market_all")],["KOSPI","KOSPI"],["KOSDAQ","KOSDAQ"]];
  let html = opts.map(([k,label])=>
    `<button aria-selected="${k===activeMarket}" data-mk="${k}">${label}</button>`).join("");
  // 자사주 탭에서는 유형 필터도 추가
  if(view==="buyback"){
    const bbOpts=[["ALL",t("all")],["취득",t("bb_acq")],["소각",t("bb_cancel")]];
    html += `<span style="display:inline-block;width:12px"></span>`;
    html += bbOpts.map(([k,label])=>
      `<button aria-selected="${k===activeBBType}" data-bbtype="${k}">${label}</button>`).join("");
  }
  $("#marketFilter").innerHTML = html;
  $("#marketFilter").querySelectorAll("button[data-mk]").forEach(b=>{
    b.onclick=()=>{activeMarket=b.dataset.mk;buildMarketFilter();render();};
  });
  $("#marketFilter").querySelectorAll("button[data-bbtype]").forEach(b=>{
    b.onclick=()=>{activeBBType=b.dataset.bbtype;buildMarketFilter();render();};
  });
}

function setFooter(){
  $("#footer").innerHTML = `
    <div class="dtitle">${t("disclaim_title")}</div>
    <p class="dline">${t("disclaim_1")}</p>
    <p class="dline">${t("disclaim_2")}</p>`;
}

function applyStaticTexts(){
  document.documentElement.lang = LANG;
  document.title = t("title_html");
  $("#tabInsider").textContent = t("tab_insider");
  $("#tabFirm").textContent = t("tab_firm");
  $("#tabBuyback").textContent = t("tab_buyback");
  $("#liveText").textContent = t("live");
  $("#businessLabel").textContent = t("business");
  $("#langToggle").querySelectorAll("button").forEach(b=>
    b.setAttribute("aria-selected", b.dataset.lang===LANG));
}

function switchLang(lang){
  LANG = lang;
  localStorage.setItem("ba_lang", lang);
  applyStaticTexts(); buildFirmTabs(); buildMarketFilter(); setFooter(); render();
}
$("#langToggle").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>switchLang(b.dataset.lang);
});

function switchView(v){
  view=v;
  $("#mainTabs").querySelectorAll("button").forEach(b=>b.setAttribute("aria-selected", b.dataset.view===v));
  buildFirmTabs(); buildMarketFilter(); setFooter(); render();
}
$("#mainTabs").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>switchView(b.dataset.view);
});

// 세 데이터 동시 로드 (5분마다 자동 갱신)
function loadData(isFirstLoad){
  Promise.all([
    fetch("data.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("insider.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("buyback.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
  ]).then(([f,i,b])=>{
    if(f) FIRM=f;
    if(i) INSIDER=i;
    if(b) BUYBACK=b;
    if(isFirstLoad){
      if(FIRM.is_seed) $("#seedFlag").innerHTML=`<span class="badge big">${t("seed")}</span>`;
      applyStaticTexts(); buildFirmTabs(); buildMarketFilter(); setFooter();
    }
    render();
  });
}
loadData(true);
// 5분(300초)마다 자동으로 새 데이터 받아오기
setInterval(()=>loadData(false), 300000);
</script>
</body>

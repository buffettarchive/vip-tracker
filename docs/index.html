<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUFFETT ARCHIVE — 국내 가치투자 운용사 지분공시 추적</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --paper:#ffffff;
    --paper-2:#f5f4f2;
    --ink:#16140f;
    --ink-soft:#6b665d;
    --line:#e4e1da;
    --accent:#1a1a1a;
    --up:#1f5c3d;
    --down:#a02b1c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:880px;margin:0 auto;padding:0 20px}

  header.mast{
    border-bottom:2px solid var(--ink);
    padding:44px 0 18px;
  }
  .kicker{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:600;margin-bottom:16px;
  }
  h1.title{
    font-family:"Pretendard Variable",Pretendard,sans-serif;
    font-weight:600;
    font-size:clamp(32px,6.5vw,52px);
    line-height:1.0;
    letter-spacing:.01em;
  }
  .meta-row{
    display:flex;flex-wrap:wrap;gap:14px;align-items:baseline;
    margin-top:20px;font-size:12.5px;color:var(--ink-soft);
  }
  .meta-row b{color:var(--ink);font-weight:600}
  .seed-flag{
    display:inline-block;background:var(--down);color:#fff;
    font-size:11px;font-weight:600;letter-spacing:.04em;
    padding:3px 9px;border-radius:2px;
  }

  .controls{
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 0 10px;flex-wrap:wrap;gap:12px;
  }
  .firm-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .firm-tabs button{
    font-family:inherit;font-size:13px;font-weight:600;
    background:transparent;border:1px solid var(--line);color:var(--ink-soft);
    padding:7px 14px;border-radius:999px;cursor:pointer;transition:.15s;
  }
  .firm-tabs button[aria-selected="true"]{
    background:var(--ink);color:#fff;border-color:var(--ink);
  }
  .count{font-size:12.5px;color:var(--ink-soft)}

  .feed{list-style:none;border-top:1px solid var(--ink)}
  .row{
    display:grid;
    grid-template-columns:88px 1fr auto;
    gap:18px;align-items:center;
    padding:20px 4px;border-bottom:1px solid var(--line);
    text-decoration:none;color:inherit;
    transition:background .15s,padding-left .15s;
  }
  .row:hover{background:var(--paper-2);padding-left:10px}
  .date{
    font-family:"Pretendard Variable",Pretendard,sans-serif;font-size:13px;color:var(--ink-soft);
    line-height:1.25;
  }
  .date .y{display:block;font-size:11px;opacity:.7}
  .corp{min-width:0}
  .corp .name{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .corp .name .code{font-size:12px;color:var(--ink-soft);font-weight:500;margin-left:7px}
  .corp .sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .corp .sub .firm{color:var(--ink);font-weight:600}
  .stake{text-align:right;white-space:nowrap}
  .stake .pct{font-family:"Pretendard Variable",Pretendard,sans-serif;font-size:24px;font-weight:600;line-height:1}
  .stake .delta{font-size:12px;margin-top:4px;font-weight:600}
  .delta.buy{color:var(--up)}
  .delta.sell{color:var(--down)}
  .delta.etc{color:var(--ink-soft)}
  .stake .held{font-size:10px;color:var(--ink-soft);letter-spacing:.04em;margin-top:2px}

  .empty{padding:60px 0;text-align:center;color:var(--ink-soft);font-size:15px}

  footer{
    margin:40px 0 60px;padding-top:18px;border-top:1px solid var(--line);
    font-size:12px;color:var(--ink-soft);line-height:1.7;
  }
  .disclaim{margin-top:10px;font-size:11.5px;opacity:.9}

  @media(max-width:560px){
    .row{grid-template-columns:64px 1fr auto;gap:12px}
    .corp .name{font-size:17px}
    .stake .pct{font-size:20px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div class="kicker">국내 가치투자 운용사 지분공시 추적 사이트</div>
    <h1 class="title">BUFFETT ARCHIVE</h1>
    <div class="meta-row">
      <span>갱신 <b id="updated">—</b></span>
      <span id="seedFlag"></span>
    </div>
  </header>

  <div class="controls">
    <div class="firm-tabs" id="firmTabs" role="tablist"></div>
    <div class="count" id="count"></div>
  </div>

  <ul class="feed" id="feed"></ul>

  <footer>
    데이터는 DART 전자공시 원자료를 기반으로 합니다. 5% 대량보유보고는 변동일로부터 5영업일 이내 제출되므로, 표시된 내용은 실제 매매 시점보다 늦을 수 있습니다. 보유비율이 5% 미만으로 내려가면 추적이 종료됩니다.
    <div class="disclaim">본 사이트는 공시 사실을 정리해 전달할 뿐이며, 특정 종목의 매수·매도를 권유하지 않습니다. 투자 판단과 그 책임은 이용자 본인에게 있습니다.</div>
  </footer>

</div>

<script>
const $ = s => document.querySelector(s);

function fmtDate(iso){
  if(!iso) return {d:"—",y:""};
  const [y,m,d] = iso.split("-");
  const mon = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"][parseInt(m)-1] || "";
  return {d:`${parseInt(d)}일`, m:mon, y};
}

function dartLink(rcept_no){
  if(!rcept_no || /^0+$/.test(rcept_no)) return null;
  return `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rcept_no}`;
}

const NON_TRADE = ["담보","질권","계약","특별관계자","특수관계자","합병","상속","증여","신탁"];
function tagFor(item){
  // 사유와 증감 부호를 직접 보고 매수/매도/기타를 판정 (옛·새 데이터 모두 일관 처리)
  const resn = item.report_resn || "";
  const irds = parseFloat(String(item.stkrt_irds).replace(/[+,%]/g,""));
  const nonTrade = NON_TRADE.some(k => resn.includes(k));
  const hasTrade = /매매|취득|매수|매도|장내/.test(resn);

  if(resn.includes("신규")) return {cls:"buy", txt:"매수 · 신규"};
  if(!isNaN(irds) && (hasTrade || !nonTrade)){
    if(irds > 0) return {cls:"buy",  txt:`매수 ▲${Math.abs(irds).toFixed(2)}%p`};
    if(irds < 0) return {cls:"sell", txt:`매도 ▼${Math.abs(irds).toFixed(2)}%p`};
  }
  if(nonTrade) return {cls:"etc", txt:"기타 (담보·계약 등)"};
  return {cls:"etc", txt:"기타"};
}

let DATA = {disclosures:[], firms:[]};
let activeFirm = "전체";

function render(){
  const list = DATA.disclosures
    .filter(x => activeFirm==="전체" || x.firm===activeFirm)
    .sort((a,b)=> (b.rcept_no||"").localeCompare(a.rcept_no||""));

  $("#count").textContent = `${list.length}건의 공시`;

  const feed = $("#feed");
  if(!list.length){ feed.innerHTML = `<li class="empty">표시할 공시가 없습니다.</li>`; return; }

  feed.innerHTML = list.map(item => {
    const dt = fmtDate(item.rcept_dt);
    const dl = dartLink(item.rcept_no);
    const tag = tagFor(item);
    const code = item.stock_code ? `<span class="code">${item.stock_code}</span>` : "";
    const inner = `
      <div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub"><span class="firm">${item.firm}</span> · ${item.report_resn||"—"}</div>
      </div>
      <div class="stake">
        <div class="pct">${item.stkrt}%</div>
        <div class="held">보유 지분</div>
        <div class="delta ${tag.cls}">${tag.txt}</div>
      </div>`;
    return dl
      ? `<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
      : `<div class="row" title="라이브 연결 전 예시 데이터">${inner}</div>`;
  }).join("");
}

function buildTabs(){
  const firms = ["전체", ...DATA.firms];
  $("#firmTabs").innerHTML = firms.map(f =>
    `<button role="tab" aria-selected="${f===activeFirm}" data-firm="${f}">${f}</button>`
  ).join("");
  $("#firmTabs").querySelectorAll("button").forEach(b=>{
    b.onclick = () => { activeFirm = b.dataset.firm; buildTabs(); render(); };
  });
}

fetch("data.json?ts=" + Date.now())
  .then(r => r.json())
  .then(d => {
    DATA = d;
    const u = new Date(d.updated_at);
    $("#updated").textContent = isNaN(u) ? "—"
      : `${u.getFullYear()}.${String(u.getMonth()+1).padStart(2,"0")}.${String(u.getDate()).padStart(2,"0")} ${String(u.getHours()).padStart(2,"0")}:${String(u.getMinutes()).padStart(2,"0")}`;
    if(d.is_seed){
      $("#seedFlag").innerHTML = `<span class="seed-flag">예시 데이터 · 라이브 연결 전</span>`;
    }
    buildTabs();
    render();
  })
  .catch(e => {
    $("#feed").innerHTML = `<li class="empty">데이터를 불러오지 못했습니다.<br>${e}</li>`;
  });
</script>
</body>
</html>

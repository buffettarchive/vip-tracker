<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUFFETT ARCHIVE — 국내 가치투자 운용사·내부자 매수 추적</title>
<meta property="og:type" content="website" />
<meta property="og:title" content="BUFFETT ARCHIVE" />
<meta property="og:description" content="국내 가치투자 운용사 지분공시 · 코스피/코스닥 내부자 매수 실시간 추적" />
<meta property="og:image" content="https://www.buffettarchive.co.kr/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="https://www.buffettarchive.co.kr/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="BUFFETT ARCHIVE" />
<meta name="twitter:description" content="국내 가치투자 운용사 지분공시 · 코스피/코스닥 내부자 매수 실시간 추적" />
<meta name="twitter:image" content="https://www.buffettarchive.co.kr/og-image.png" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  @font-face{
    font-family:"Chomsky";
    src:url("Chomsky.woff2") format("woff2");
    font-weight:normal; font-style:normal; font-display:swap;
  }
  :root{
    --paper:#0e0e10; --paper-2:#1a1a1d;
    --ink:#f2f0ea; --ink-soft:#9b958a; --line:#2c2c30;
    --up:#4caf7e; --down:#e06458; --live:#ff5247;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:0 20px}

  header.mast{border-bottom:2px solid var(--ink);padding:44px 0 0;}
  .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:16px;}
  h1.title{font-family:"Chomsky",serif;font-weight:400;font-size:clamp(44px,9vw,76px);line-height:1.08;letter-spacing:.06em;color:#d8d5cc;-webkit-text-stroke:0.6px var(--paper);text-stroke:0.6px var(--paper);}
  .meta-row{display:flex;flex-wrap:wrap;gap:14px;align-items:baseline;margin-top:20px;font-size:12.5px;color:var(--ink-soft);}
  .live{display:inline-flex;align-items:center;gap:6px;color:var(--live);font-weight:600}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%{opacity:1;box-shadow:0 0 0 0 rgba(214,58,46,.5)}70%{opacity:.55;box-shadow:0 0 0 5px rgba(214,58,46,0)}100%{opacity:1;box-shadow:0 0 0 0 rgba(214,58,46,0)}}

  /* 상단 큰 탭 */
  .maintabs{display:flex;gap:0;margin-top:26px;}
  .maintabs button{
    font-family:inherit;font-size:15px;font-weight:600;
    background:transparent;border:none;border-bottom:2px solid transparent;
    color:var(--ink-soft);padding:12px 4px;margin-right:28px;cursor:pointer;
    transform:translateY(2px);transition:.15s;
  }
  .maintabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--ink);}

  .controls{display:flex;justify-content:space-between;align-items:center;padding:18px 0 10px;flex-wrap:wrap;gap:12px;}
  .firm-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .firm-tabs button{font-family:inherit;font-size:13px;font-weight:600;background:transparent;border:1px solid var(--line);color:var(--ink-soft);padding:7px 14px;border-radius:999px;cursor:pointer;transition:.15s;}
  .firm-tabs button[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}
  .count{font-size:12.5px;color:var(--ink-soft)}

  .feed{list-style:none;border-top:1px solid var(--ink)}
  .row{display:grid;grid-template-columns:88px 1fr auto;gap:18px;align-items:center;
    padding:20px 4px;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
    transition:background .15s,padding-left .15s;}
  .row:hover{background:var(--paper-2);padding-left:10px}
  .row.dim{opacity:.4}
  .date{font-size:13px;color:var(--ink-soft);line-height:1.25;}
  .date .y{display:block;font-size:11px;opacity:.7}
  .corp{min-width:0}
  .corp .name{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .corp .name .code{font-size:12px;color:var(--ink-soft);font-weight:500;margin-left:7px}
  .corp .sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .corp .sub .who{color:var(--ink);font-weight:600}
  .stake{text-align:right;white-space:nowrap}
  .stake .pct{font-size:24px;font-weight:600;line-height:1}
  .stake .held{font-size:10px;color:var(--ink-soft);letter-spacing:.04em;margin-top:2px}
  .stake .delta{font-size:12px;margin-top:4px;font-weight:600}
  .delta.buy{color:var(--up)} .delta.sell{color:var(--down)} .delta.etc{color:var(--ink-soft)}
  .badge{display:inline-block;font-size:10.5px;font-weight:600;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle;}
  .badge.in{background:#163a28;color:#5fd197}
  .badge.out{background:#3a3320;color:#d4b876}
  .badge.big{background:#3d2420;color:#e89086}
  .badge.mkt-y{background:#1a2c44;color:#7fb0e8}
  .badge.mkt-k{background:#3a3320;color:#d4b876}

  .empty{padding:60px 0;text-align:center;color:var(--ink-soft);font-size:15px}
  footer{margin:36px 0 0;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);line-height:1.7;}
  .disclaim{margin-top:10px;font-size:11.5px;opacity:.9}
  .dtitle{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:10px}
  .dline{font-size:12px;color:var(--ink-soft);line-height:1.65;margin-bottom:7px}
  .contact{margin:14px 0 50px;font-size:12.5px;letter-spacing:.02em}
  .contact a{color:var(--ink);text-decoration:none;font-weight:700}
  .contact a:hover{border-bottom:1px solid var(--ink)}
  @media(max-width:560px){.row{grid-template-columns:58px 1fr auto;gap:12px}.corp .name{font-size:16px}.stake .pct{font-size:19px}.maintabs button{font-size:14px;margin-right:18px}}
</style>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-6B17RZ2E78"></script>
<script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-6B17RZ2E78');
</script>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div class="kicker">국내 가치투자 자산운용사 · 내부자 매수 트래킹 사이트</div>
    <h1 class="title">Buffett Archive</h1>
    <div class="meta-row">
      <span class="live"><span class="dot"></span>실시간 자동 추적 중</span>
      <span id="seedFlag"></span>
    </div>
    <div class="maintabs" id="mainTabs" role="tablist">
      <button role="tab" data-view="insider" aria-selected="true">내부자 매수</button>
      <button role="tab" data-view="firm" aria-selected="false">운용사 지분공시</button>
    </div>
  </header>

  <div class="controls">
    <div class="firm-tabs" id="firmTabs" role="tablist"></div>
    <div class="count" id="count"></div>
  </div>

  <ul class="feed" id="feed"></ul>

  <footer id="footer"></footer>

  <div class="contact"><a href="mailto:harold08@naver.com">Business : harold08@naver.com</a></div>

</div>

<script>
const $ = s => document.querySelector(s);

function fmtDate(iso){
  if(!iso) return {d:"—",m:"",y:""};
  const [y,m,d] = iso.split("-");
  const mon = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"][parseInt(m)-1] || "";
  return {d:`${parseInt(d)}일`, m:mon, y};
}
function dartLink(rcept_no){
  if(!rcept_no || /^0+$/.test(rcept_no)) return null;
  return `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rcept_no}`;
}

/* ── 운용사(지분공시) 라벨 ── */
function firmTag(item){
  const cur=parseFloat(item.stkrt), prev=parseFloat(item.stkrt_prev);
  const diff=(!isNaN(cur)&&!isNaN(prev))?(cur-prev):null;
  const kind=item.kind||"";
  if(kind.includes("신규")) return {cls:"buy",txt:"매수 · 신규"};
  if(kind==="매수") return {cls:"buy",txt:diff!=null?`매수 ▲${Math.abs(diff).toFixed(2)}%p`:"매수"};
  if(kind==="매도") return {cls:"sell",txt:diff!=null?`매도 ▼${Math.abs(diff).toFixed(2)}%p`:"매도"};
  return {cls:"etc",txt:"기타"};
}

let FIRM={disclosures:[],firms:[]}, INSIDER={disclosures:[]};
let view="insider", activeFirm="전체";

function renderFirm(){
  const list=FIRM.disclosures
    .filter(x=>activeFirm==="전체"||x.firm===activeFirm)
    .sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=`${list.length}건의 공시`;
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">표시할 공시가 없습니다.</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no), tag=firmTag(item);
    const code=item.stock_code?`<span class="code">${item.stock_code}</span>`:"";
    const inner=`
      <div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub"><span class="who">${item.firm}</span> · ${item.report_resn||"—"}</div>
      </div>
      <div class="stake">
        <div class="pct">${item.stkrt}%</div>
        <div class="held">보유 지분</div>
        <div class="delta ${tag.cls}">${tag.txt}</div>
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function renderInsider(){
  const list=INSIDER.disclosures
    .slice()
    .sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=`${list.length}건의 내부자 매수`;
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">표시할 내부자 매수가 없습니다.</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no);
    const code=item.stock_code?`<span class="code">${item.stock_code}</span>`:"";
    // 시장 배지(코스피/코스닥)
    const mk=item.market||"";
    let mkb="";
    if(mk==="KOSPI") mkb=`<span class="badge mkt-y">KOSPI</span> `;
    else if(mk==="KOSDAQ") mkb=`<span class="badge mkt-k">KOSDAQ</span> `;
    // 취득방법 배지
    const m=item.method||"";
    let mb="";
    if(m.includes("장내")) mb=`<span class="badge in">장내매수</span>`;
    else if(m.includes("장외")) mb=`<span class="badge out">장외매수</span>`;
    else if(m.includes("시간외")) mb=`<span class="badge out">시간외</span>`;
    // 직위/주요주주 표시
    const pos=[item.ofcps,item.main_shrholdr&&item.main_shrholdr!=="-"?item.main_shrholdr:""].filter(Boolean).join(" · ");
    const inner=`
      <div class="date">${dt.m} ${dt.d}<span class="y">${dt.y}</span></div>
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub">${mkb}<span class="who">${item.repror}</span> · ${pos||"—"} ${mb}</div>
      </div>
      <div class="stake">
        <div class="pct">+${item.irds_cnt}</div>
        <div class="held">매수 주식수</div>
        <div class="delta buy">보유 ${item.hold_rate}%</div>
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function render(){ view==="firm"?renderFirm():renderInsider(); }

function buildFirmTabs(){
  if(view!=="firm"){ $("#firmTabs").innerHTML=""; return; }
  const firms=["전체",...(FIRM.firms||[])];
  $("#firmTabs").innerHTML=firms.map(f=>
    `<button role="tab" aria-selected="${f===activeFirm}" data-firm="${f}">${f}</button>`).join("");
  $("#firmTabs").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{activeFirm=b.dataset.firm;buildFirmTabs();render();};
  });
}

function setFooter(){
  $("#footer").innerHTML = `
    <div class="dtitle">면책조항</div>
    <p class="dline">5% 대량보유보고서 및 임원·주요주주 특정증권등 소유상황보고서는 보고의무발생일로부터 5영업일 이내 제출되므로, 표시내용은 실제 매매 시점보다 늦을 수 있습니다.</p>
    <p class="dline">본 사이트는 공시 사실을 정리해 전달할 뿐이며, 특정 종목의 매수 및 매도를 권유하지 않습니다. 투자판단과 책임은 이용자 본인에게 있습니다.</p>`;
}

function switchView(v){
  view=v;
  $("#mainTabs").querySelectorAll("button").forEach(b=>b.setAttribute("aria-selected", b.dataset.view===v));
  buildFirmTabs(); setFooter(); render();
}
$("#mainTabs").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>switchView(b.dataset.view);
});

// 두 데이터 동시 로드 (5분마다 자동 갱신)
function loadData(isFirstLoad){
  Promise.all([
    fetch("data.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("insider.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
  ]).then(([f,i])=>{
    if(f) FIRM=f;
    if(i) INSIDER=i;
    if(isFirstLoad){
      if(FIRM.is_seed) $("#seedFlag").innerHTML=`<span class="badge big">예시 데이터</span>`;
      buildFirmTabs(); setFooter();
    }
    render();
  });
}
loadData(true);
// 5분(300초)마다 자동으로 새 데이터 받아오기
setInterval(()=>loadData(false), 300000);
</script>
</body>
</html>

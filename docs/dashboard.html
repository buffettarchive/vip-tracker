*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cobalt:#0047FF; --cobalt-d:#0034c2;
  --bg:#F8F7F4; --card:#ffffff; --ink:#16181d; --muted:#74767c;
  --line:#ecebe5; --line-2:#f3f3ef; --chip:#e9eeff;
  --up:#0047FF; --down:#e0473b;
}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Spoqa Han Sans Neo', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight:400; line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
::selection{background:rgba(0,71,255,.16)}
.wrap{max-width:960px;margin:0 auto;padding:0 20px}

/* ── 상단 네비게이션 ── */
.topnav{
  position:sticky;top:0;z-index:50;
  background:rgba(248,247,244,.86);backdrop-filter:saturate(180%) blur(12px);
}
.topnav-inner{
  max-width:960px;margin:0 auto;padding:16px 20px;
  display:flex;align-items:center;
}
.topnav .logo{height:32px;width:auto;transition:opacity .15s}
.topnav a:hover .logo{opacity:.7}

/* 메뉴 이동 링크 (우측 끝 배치, 연회색 -> 파란색 통일) */
.nav-links{
  margin-left:auto;
  display:flex; gap:28px; font-size:16px; font-weight:700; align-items:center;
}
.nav-links a{color:var(--muted); transition:0.2s;}
.nav-links a:hover{color:var(--ink);}
.nav-links a.active{color:var(--cobalt); text-decoration:none;}

.langtoggle{display:inline-flex;align-items:center;gap:2px;font-size:13px;font-weight:600;margin-left:32px;}
.langtoggle button{font-family:inherit;background:transparent;border:0;color:#b7b6ae;padding:5px 7px;cursor:pointer;transition:color .15s;border-radius:8px}
.langtoggle button:hover{color:var(--muted)}
.langtoggle button[aria-selected="true"]{color:var(--ink);font-weight:700}
.langtoggle .divider{color:#dcdbd3;font-weight:400}

#seedFlag{display:inline-block}

/* ── 시장 지표 티커 ── */
.ticker{
  display:flex;gap:10px;margin:32px 0 4px;overflow-x:auto;white-space:nowrap;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;
}
.ticker::-webkit-scrollbar{display:none}

/* ── TradingView 차트 ── */
.chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px 18px 8px;margin-top:14px;box-shadow:0 4px 20px rgba(22,24,29,.04)}
.chart-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;padding:0 4px;flex-wrap:wrap}
.chart-tf{margin-left:auto;display:inline-flex;gap:2px;background:#f1f2f6;border-radius:10px;padding:3px}
.chart-tf button{font-family:inherit;font-size:12.5px;font-weight:700;color:var(--muted);background:transparent;border:none;padding:5px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.chart-tf button[aria-selected="true"]{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(22,24,29,.1)}
.ohlc-bar{display:flex;gap:16px;flex-wrap:wrap;padding:0 4px 12px;font-size:12.5px;min-height:20px}
.ohlc-bar .ohlc-date{color:var(--ink);font-weight:700}
.ohlc-bar .ohlc-item{color:var(--muted)}
.ohlc-bar .ohlc-item b{font-weight:700;margin-left:3px}
.ohlc-bar .up{color:var(--down)}
.ohlc-bar .down{color:var(--cobalt)}
.chart-title{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.chart-hint{font-size:12px;color:var(--muted)}
.tv-chart{height:340px;width:100%;border-radius:12px;overflow:hidden}
.ticker-item{cursor:pointer}
.ticker-item.active{background:var(--chip);border-color:var(--chip)}
.ticker-item.active .ticker-name{color:var(--cobalt)}
.ticker-item{
  display:inline-flex;align-items:baseline;gap:8px;flex:0 0 auto;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 16px;box-shadow:0 1px 2px rgba(22,24,29,.03);
}
.ticker-name{color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.03em}
.ticker-price{color:var(--ink);font-weight:700;font-size:14px}
.ticker-chg{font-size:12.5px;font-weight:700}
.ticker-chg.up{color:var(--up)} .ticker-chg.down{color:var(--down)} .ticker-chg.flat{color:var(--muted)}

/* ── 메인 탭 (3D 버튼 스타일) ── */
.maintabs{display:flex;gap:9px;margin:24px 0 0;flex-wrap:wrap}
.maintabs button{
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  padding:11px 20px;border-radius:9999px;border:none;
  background:var(--card);color:#4b4d55;box-shadow:0 3px 0 #e4e2db;
  transition:transform .12s,box-shadow .12s;
}
.maintabs button:active{transform:translateY(3px);box-shadow:0 0 0 #e4e2db}
.maintabs button[aria-selected="true"]{
  background:var(--cobalt);color:#fff;
  box-shadow:0 4px 0 var(--cobalt-d),0 8px 16px rgba(0,71,255,.24);
}

/* ── 필터 컨트롤 ── */
.controls{display:flex;align-items:center;padding:22px 0 6px;flex-wrap:wrap;gap:10px}
.firm-tabs,.market-filter{display:flex;gap:6px;flex-wrap:wrap}
.firm-tabs button,.market-filter button{
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  background:var(--card);border:1px solid var(--line);color:var(--muted);
  padding:7px 14px;border-radius:999px;transition:.15s;
}
.firm-tabs button:hover,.market-filter button:hover{border-color:#d9d8d1;color:var(--ink)}
.firm-tabs button[aria-selected="true"],.market-filter button[aria-selected="true"]{
  background:var(--cobalt);color:#fff;border-color:var(--cobalt);
}
.count{font-size:13px;color:var(--muted);margin-left:auto;font-weight:600}

/* ── 피드 리스트 (카드 컨테이너) ── */
.feed{list-style:none;background:var(--card);border:1px solid var(--line);border-radius:20px;margin-top:14px;overflow:hidden;box-shadow:0 4px 20px rgba(22,24,29,.04)}
.row{
  display:grid;grid-template-columns:52px 1fr auto;gap:16px;align-items:center;
  padding:18px 22px;border-bottom:1px solid var(--line-2);
  transition:background .12s;
}
.row:last-child{border-bottom:none}
.row:hover{background:#faf9f6}
a.row{cursor:pointer}
.row.dim{opacity:.5}

/* 이니셜 동그라미 */
.avatar{
  width:52px;height:52px;border-radius:16px;background:#f1f2f6;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#5a6270;letter-spacing:-.5px;
}

.corp{min-width:0}
.corp .name{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--ink);display:flex;align-items:center;flex-wrap:wrap;gap:2px}
.corp .name .code{font-size:12px;color:var(--muted);font-weight:500;margin-left:5px}
.corp .sub{font-size:13px;color:var(--muted);margin-top:5px}
.corp .sub .who{color:var(--ink);font-weight:600}

.stake{text-align:right;white-space:nowrap}
.stake .pct{font-size:22px;font-weight:700;line-height:1;color:var(--cobalt);letter-spacing:-.5px}
.stake .held{font-size:11px;color:var(--muted);letter-spacing:.02em;margin-top:5px}
.stake .delta{font-size:12.5px;margin-top:4px;font-weight:700}
.delta.buy{color:#12a55a} .delta.sell{color:var(--down)} .delta.etc{color:var(--muted)}

/* ── 배지 ── */
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle;letter-spacing:.01em}
.badge.in{background:#e3ecff;color:#0047FF}
.badge.out{background:#fff0dd;color:#c67c1e}
.badge.big{background:#ffe3df;color:#d0402f}
.badge.mkt-y{background:#e3ecff;color:#2f6fe0}
.badge.mkt-k{background:#fdf0d9;color:#c0912b}
.badge.bb-acq{background:#e3ecff;color:#0047FF}
.badge.bb-cancel{background:#efe3fb;color:#8a4fd0}

.empty{padding:64px 0;text-align:center;color:var(--muted);font-size:15px}

/* ── 운용사 포트폴리오 뷰 ── */
.firm-row{cursor:pointer}
.stock-row{cursor:pointer}
.firm-avatar{background:var(--chip);color:var(--cobalt)}
.pf-header{list-style:none;padding:20px 22px 22px;border-bottom:2px solid var(--ink)}
.pf-back{font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:0;margin-bottom:14px;transition:color .15s}
.pf-back:hover{color:var(--cobalt)}
.pf-title{font-size:24px;font-weight:700;letter-spacing:-.6px;color:var(--ink)}
.pf-meta{font-size:12.5px;color:var(--muted);margin-top:6px}

/* ── 면책조항 / 푸터 ── */
footer#footer{margin:40px 0 0;padding-top:24px;border-top:1px solid var(--line)}
.dtitle{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
.dline{font-size:12.5px;color:var(--muted);line-height:1.7;margin-bottom:7px}
.contact{margin:18px 0 56px;font-size:13px}
.contact a{color:var(--ink);font-weight:700}
.contact a:hover{color:var(--cobalt)}

</style>

function localizeFirm(name){
  if(LANG==="en") return FIRM_EN[name]||name;
  return FIRM_KO[name]||name;
}
function localizeRole(text){
  if(!text||text==="-") return text;
  if(LANG==="ko") return text;
  for(const [k,v] of ROLE_EN){ if(text.includes(k)) return text.replace(k,v); }
  return text;
}
function localizeResn(text){
  if(!text) return text;
  if(LANG==="ko") return text;
  for(const [k,v] of RESN_EN){ if(text===k||text.includes(k)) return v; }
  return text;
}
function t(key, ...args){
  const v = I18N[LANG][key];
  return typeof v==="function" ? v(...args) : v;
}

let LANG = localStorage.getItem("ba_lang");
if(!LANG){
  const nav=(navigator.language||"").toLowerCase();
  LANG = nav.startsWith("ko") ? "ko" : "en";
}

function fmtDate(iso){
  if(!iso) return {d:"—",m:"",y:""};
  let y,m,d;
  if(iso.includes("-")){[y,m,d]=iso.split("-");}
  else if(iso.length===8){y=iso.slice(0,4);m=iso.slice(4,6);d=iso.slice(6,8);}
  else return {d:"—",m:"",y:""};
  const months = LANG==="en"
    ? ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
    : ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const mon = months[parseInt(m)-1] || "";
  const dd = LANG==="en" ? `${parseInt(d)}` : `${parseInt(d)}일`;
  return {d:dd, m:mon, y};
}

function dartLink(rcept_no){
  if(!rcept_no || /^0+$/.test(rcept_no)) return null;
  return `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rcept_no}`;
}

function firmTag(item){
  const cur=parseFloat(item.stkrt), prev=parseFloat(item.stkrt_prev);
  const diff=(!isNaN(cur)&&!isNaN(prev))?(cur-prev):null;
  const kind=item.kind||"";
  if(!kind) return {cls:"etc",txt:t("kind_pending")};
  if(kind.includes("신규")) return {cls:"buy",txt:cur!=null?`${t("kind_new")} +${cur.toFixed(2)}%p`:t("kind_new")};
  if(kind==="매수") return {cls:"buy",txt:diff!=null?`${t("kind_buy")} ▲${Math.abs(diff).toFixed(2)}%p`:t("kind_buy")};
  if(kind==="매도") return {cls:"sell",txt:diff!=null?`${t("kind_sell")} ▼${Math.abs(diff).toFixed(2)}%p`:t("kind_sell")};
  return {cls:"etc",txt:t("kind_etc")};
}

let FIRM={disclosures:[],firms:[]}, INSIDER={disclosures:[]}, BUYBACK={entries:[]}, ARCHIVE={disclosures:[],firms:[]};

// URL 파라미터에서 초기 뷰 로드
const params = new URLSearchParams(window.location.search);
let view = params.get("view") || "insider";
if(!["insider", "firm", "buyback"].includes(view)) view = "insider";

let activeFirm="전체", activeMarket="ALL", activeBBType="ALL";
let currentChartName="KOSPI";
let LAST_MARKET=null;

// ── 상단 네비게이션 활성화 로직 ──
function updateNavLinks() {
  document.querySelectorAll(".nav-links a").forEach(a => a.classList.remove("active"));
  const activeNav = document.getElementById("nav-" + view);
  if(activeNav) activeNav.classList.add("active");
}

document.querySelectorAll(".nav-links a").forEach(link => {
  link.onclick = (e) => {
    const href = link.getAttribute("href");
    if(href.startsWith("dashboard.html?view=")){
      e.preventDefault();
      switchView(href.split("view=")[1]);
    }
  };
});

// ── TradingView 위젯 차트 ──
const TV_SYMBOLS = {
  "KOSPI": "KRX:KOSPI",
  "KOSDAQ": "KRX:KOSDAQ",
  "S&P 500": "SP:SPX",
  "USD/KRW": "FX_IDC:USDKRW",
  "야간선물": "KRX:101V3"
};

let tvWidget = null;

function drawChart(name){
  currentChartName = name;
  document.querySelectorAll(".ticker-item").forEach(it=>{
    it.classList.toggle("active", it.dataset.tvname===name);
  });
  const symbol = TV_SYMBOLS[name] || "KRX:KOSPI";
  const container = document.getElementById("tv_chart_container");
  if(!container) return;
  container.innerHTML = "";
  tvWidget = new TradingView.widget({
    container_id: "tv_chart_container",
    symbol: symbol,
    interval: "D",
    timezone: "Asia/Seoul",
    theme: "light",
    style: "1",
    locale: "kr",
    width: "100%",
    height: "100%",
    toolbar_bg: "#ffffff",
    enable_publishing: false,
    allow_symbol_change: false,
    hide_side_toolbar: true,
    details: false,
    hotlist: false,
    calendar: false,
    withdateranges: true,
    save_image: false,
    backgroundColor: "#ffffff",
    gridColor: "#f3f3ef",
  });
}

// ── 시장 지표 티커 ──
const CHART_NAMES = ["KOSPI","KOSDAQ","S&P 500","USD/KRW","야간선물"];

function renderTicker(mk){
  const el=document.getElementById("ticker");
  if(!el) return;
  if(!mk||!mk.quotes){ return; }
  const order=["KOSPI","KOSDAQ","S&P 500","USD/KRW","야간선물"];
  const html = order.map(name=>{
    const q=mk.quotes[name];
    if(!q || typeof q.price!=="number") return "";
    const pct = (typeof q.change_pct==="number") ? q.change_pct : 0;
    const cls=pct>0?"up":pct<0?"down":"flat";
    const sign=pct>0?"+":"";
    const price=name==="USD/KRW"?q.price.toFixed(2):q.price.toLocaleString();
    const active = (name===currentChartName) ? " active" : "";
    return `<div class="ticker-item${active}" data-tvname="${name}">
      <span class="ticker-name">${name}</span>
      <span class="ticker-price">${price}</span>
      <span class="ticker-chg ${cls}">${sign}${pct.toFixed(2)}%</span>
    </div>`;
  }).join("");
  if(!html) return;
  el.innerHTML = html;
  el.querySelectorAll(".ticker-item").forEach(item=>{
    item.onclick = ()=>{
      const name = item.dataset.tvname;
      if(CHART_NAMES.includes(name)) drawChart(name);
    };
  });
}

// ── 운용사 지분공시 (일자별 플랫 리스트 뷰) ──
function renderFirm(){
  let list = [...(ARCHIVE.disclosures || []), ...(FIRM.disclosures || [])];
  // 중복 공시 제거 (접수번호 기준)
  const unique = Array.from(new Map(list.map(item => [item.rcept_no, item])).values());
  list = unique;

  if(activeFirm!=="전체"){
    list = list.filter(x => x.firm === activeFirm);
  }
  // 가장 최근 공시부터 내림차순 정렬
  list.sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));

  $("#count").textContent = t("count_firm", list.length);
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">${t("empty_firm")}</li>`;return;}

  feed.innerHTML = list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no);
    const tag=firmTag(item);
    const code=item.stock_code?`<span class="code">${item.stock_code}</span>`:"";

    const inner=`
      <div class="avatar">${(item.corp_name||"·").trim().charAt(0)}</div>
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub">${localizeFirm(item.firm)} · ${localizeResn(item.report_resn)}</div>
      </div>
      <div class="stake">
        <div class="pct">${item.stkrt ? item.stkrt+"%" : "—"}</div>
        <div class="held">${dt.m} ${dt.d}</div>
        <div class="delta ${tag.cls}">${tag.txt}</div>
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function renderInsider(){
  const list=INSIDER.disclosures
    .filter(x => activeMarket==="ALL" || (x.market||"")===activeMarket)
    .sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=t("count_insider", list.length);
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">${t("empty_insider")}</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no);
    const code=item.stock_code?`<span class="code">${item.stock_code}</span>`:"";
    const mk=item.market||"";
    let mkb="";
    if(mk==="KOSPI") mkb=`<span class="badge mkt-y">KOSPI</span> `;
    else if(mk==="KOSDAQ") mkb=`<span class="badge mkt-k">KOSDAQ</span> `;
    const m=item.method||"";
    let mb="";
    if(m.includes("장내")) mb=`<span class="badge in">${t("badge_in")}</span>`;
    else if(m.includes("장외")) mb=`<span class="badge out">${t("badge_out")}</span>`;
    else if(m.includes("시간외")) mb=`<span class="badge out">${t("badge_aft")}</span>`;
    const ofcpsLoc = localizeRole(item.ofcps||"");
    const mainLoc = (item.main_shrholdr && item.main_shrholdr!=="-")
                    ? localizeRole(item.main_shrholdr) : "";
    const pos=[ofcpsLoc, mainLoc].filter(Boolean).join(" · ");
    const inner=`
      <div class="avatar">${(item.corp_name||"·").trim().charAt(0)}</div>
      <div class="corp">
        <div class="name">${item.corp_name}${code}</div>
        <div class="sub">${mkb}<span class="who">${item.repror}</span> · ${pos||"—"} ${mb}</div>
      </div>
      <div class="stake">
        <div class="pct">+${item.irds_cnt}</div>
        <div class="held">${t("bought")} · ${dt.m} ${dt.d}</div>
        <div class="delta buy">${t("hold")} ${item.hold_rate}%</div>
      </div>`;
    return dl?`<a class="row" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row">${inner}</div>`;
  }).join("");
}

function renderBuyback(){
  let list=(BUYBACK.entries||[]).filter(x => !(x.report_nm||"").includes("신탁계약"));
  if(activeMarket!=="ALL"){
    const cls = activeMarket==="KOSPI"?"Y":"K";
    list = list.filter(x => x.corp_cls===cls);
  }
  if(activeBBType!=="ALL"){
    list = list.filter(x => x.type===activeBBType);
  }
  list.sort((a,b)=>(b.rcept_no||"").localeCompare(a.rcept_no||""));
  $("#count").textContent=t("count_buyback", list.length);
  const feed=$("#feed");
  if(!list.length){feed.innerHTML=`<li class="empty">${t("empty_buyback")}</li>`;return;}
  feed.innerHTML=list.map(item=>{
    const dt=fmtDate(item.rcept_dt), dl=dartLink(item.rcept_no);
    const isAcq = item.type==="취득";
    const typeBadge = isAcq
      ? `<span class="badge bb-acq">${t("bb_acq")}</span>`
      : `<span class="badge bb-cancel">${t("bb_cancel")}</span>`;
    let mkb="";
    if(item.corp_cls==="Y") mkb=`<span class="badge mkt-y">KOSPI</span> `;
    else if(item.corp_cls==="K") mkb=`<span class="badge mkt-k">KOSDAQ</span> `;
    const purpose = item.acq_purpose || "";
    const method = item.acq_method || "";
    let subParts = [purpose, method].filter(Boolean);
    const sub = subParts.length ? subParts.join(" · ") : "—";
    const hasData = !!item.shares_common;
    const shares = hasData ? item.shares_common.toLocaleString() : "—";
    let amtLabel = "";
    if(item.amount_common){
      const billions = item.amount_common / 100000000;
      amtLabel = billions >= 1
        ? `${billions.toFixed(1)}${LANG==="en"?"B KRW":"억원"}`
        : `${(item.amount_common/10000).toFixed(0)}${LANG==="en"?"M KRW":"만원"}`;
    }
    const dimCls = hasData ? "" : " dim";
    const inner=`
      <div class="avatar">${(item.corp_name||"·").trim().charAt(0)}</div>
      <div class="corp">
        <div class="name">${item.corp_name||"—"} ${typeBadge}</div>
        <div class="sub">${mkb}${sub}</div>
      </div>
      <div class="stake">
        <div class="pct">${shares}</div>
        <div class="held">${(hasData ? (isAcq ? t("bb_shares") : t("bb_shares_cancel")) : t("kind_pending"))} · ${dt.m} ${dt.d}</div>
        ${amtLabel ? `<div class="delta buy">${amtLabel}</div>` : ""}
      </div>`;
    return dl?`<a class="row${dimCls}" href="${dl}" target="_blank" rel="noopener">${inner}</a>`
             :`<div class="row${dimCls}">${inner}</div>`;
  }).join("");
}

function render(){
  if(view==="firm") renderFirm();
  else if(view==="buyback") renderBuyback();
  else renderInsider();
}

function buildFirmTabs(){
  if(view!=="firm"){ $("#firmTabs").innerHTML=""; $("#firmTabs").style.display="none"; return; }
  $("#firmTabs").style.display="flex";
  const firms = ["전체", ...(ARCHIVE.firms || FIRM.firms || [])];
  const uniqFirms = [...new Set(firms)];
  $("#firmTabs").innerHTML = uniqFirms.map(f=>
    `<button aria-selected="${f===activeFirm}" data-f="${f}">${f==="전체"?t("all"):localizeFirm(f)}</button>`
  ).join("");
  $("#firmTabs").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{activeFirm=b.dataset.f; buildFirmTabs(); render();};
  });
}

function buildMarketFilter(){
  if(view==="firm"){ $("#marketFilter").innerHTML=""; $("#marketFilter").style.display="none"; return; }
  $("#marketFilter").style.display="flex";
  const opts=[["ALL",t("market_all")],["KOSPI","KOSPI"],["KOSDAQ","KOSDAQ"]];
  let html = opts.map(([k,label])=>
    `<button aria-selected="${k===activeMarket}" data-mk="${k}">${label}</button>`).join("");
  if(view==="buyback"){
    const bbOpts=[["ALL",t("all")],["취득",t("bb_acq")],["소각",t("bb_cancel")]];
    html += `<span style="display:inline-block;width:12px"></span>`;
    html += bbOpts.map(([k,label])=>
      `<button aria-selected="${k===activeBBType}" data-bbtype="${k}">${label}</button>`).join("");
  }
  $("#marketFilter").innerHTML = html;
  $("#marketFilter").querySelectorAll("button[data-mk]").forEach(b=>{
    b.onclick=()=>{activeMarket=b.dataset.mk;buildMarketFilter();render();};
  });
  $("#marketFilter").querySelectorAll("button[data-bbtype]").forEach(b=>{
    b.onclick=()=>{activeBBType=b.dataset.bbtype;buildMarketFilter();render();};
  });
}

function setFooter(){
  $("#footer").innerHTML = `
    <div class="dtitle">${t("disclaim_title")}</div>
    <p class="dline">${t("disclaim_1")}</p>
    <p class="dline">${t("disclaim_2")}</p>`;
}

function applyStaticTexts(){
  document.documentElement.lang = LANG;
  document.title = LANG==="en" ? "Buffett Archive" : "버핏아카이브";
  $("#tabInsider").textContent = t("tab_insider");
  $("#tabFirm").textContent = t("tab_firm");
  $("#tabBuyback").textContent = t("tab_buyback");
  $("#businessLabel").textContent = t("business");
  $("#langToggle").querySelectorAll("button").forEach(b=>
    b.setAttribute("aria-selected", b.dataset.lang===LANG));
  
  // 영문 네비게이션 텍스트
  const navGuru = document.getElementById("nav-guru");
  const navInsider = document.getElementById("nav-insider");
  const navFirm = document.getElementById("nav-firm");
  const navBuyback = document.getElementById("nav-buyback");

  if(navGuru) navGuru.textContent = LANG==="en" ? "Guru Portfolio" : "구루 포트폴리오";
  if(navInsider) navInsider.textContent = LANG==="en" ? "Insider Buying" : "내부자매수";
  if(navFirm) navFirm.textContent = LANG==="en" ? "Firm Filings" : "운용사 지분공시";
  if(navBuyback) navBuyback.textContent = LANG==="en" ? "Buybacks" : "자사주매입";
}

function switchLang(lang){
  LANG = lang;
  localStorage.setItem("ba_lang", lang);
  applyStaticTexts(); buildFirmTabs(); buildMarketFilter(); setFooter(); render();
}
$("#langToggle").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>switchLang(b.dataset.lang);
});

function switchView(v, updateUrl=true){
  view=v;
  $("#mainTabs").querySelectorAll("button").forEach(b=>b.setAttribute("aria-selected", b.dataset.view===v));
  updateNavLinks();
  if(updateUrl) window.history.replaceState(null, "", "?view="+v);
  buildFirmTabs(); buildMarketFilter(); setFooter(); render();
}
$("#mainTabs").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>switchView(b.dataset.view);
});

// 화면 초기화 셋업
updateNavLinks();
$("#mainTabs").querySelectorAll("button").forEach(b=>b.setAttribute("aria-selected", b.dataset.view===view));

function loadData(isFirstLoad){
  Promise.all([
    fetch("data.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("insider.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("buyback.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("market.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null),
    fetch("archive.json?ts="+Date.now()).then(r=>r.json()).catch(()=>null), 
  ]).then(([f,i,b,mk,ar])=>{
    if(f) FIRM=f;
    if(i) INSIDER=i;
    if(b) BUYBACK=b;
    if(mk){ LAST_MARKET=mk; }
    
    if(ar) {
      ARCHIVE = ar;
      if (f && f.disclosures) {
        const merged = [...ar.disclosures, ...f.disclosures];
        const unique = Array.from(new Map(merged.map(item => [item.rcept_no, item])).values());
        ARCHIVE.disclosures = unique;
        
        const allFirms = [...(ar.firms || []), ...(f.firms || [])];
        ARCHIVE.firms = [...new Set(allFirms)];
      }
    }
    
    renderTicker(LAST_MARKET);
    if(mk) drawChart(currentChartName);
    if(isFirstLoad){
      if(FIRM.is_seed) $("#seedFlag").innerHTML=`<span class="badge big">${t("seed")}</span>`;
      applyStaticTexts(); buildFirmTabs(); buildMarketFilter(); setFooter();
    }
    render();
  });
}
loadData(true);
setInterval(()=>loadData(false), 300000);

function refreshTicker(){
  fetch("market.json?ts="+Date.now())
    .then(r=>r.json())
    .then(mk=>{ if(mk){ LAST_MARKET=mk; renderTicker(mk); drawChart(currentChartName); } })
    .catch(()=>{});
}
refreshTicker();

drawChart("KOSPI");
</script>

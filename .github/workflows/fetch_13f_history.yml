name: 13F 히스토리 백필

on:
  workflow_dispatch:
    inputs:
      quarters:
        description: '구루당 최대 분기 수 (빈칸 = 전체)'
        required: false
        default: ''
      guru:
        description: '특정 구루만 (이름 일부, 빈칸 = 전체 81명)'
        required: false
        default: ''
      start_year:
        description: '수집 시작년도 (기본: 2020)'
        required: false
        default: '2020'
      end_quarter:
        description: '수집 종료 분기 (예: 2026_Q1)'
        required: false
        default: '2026_Q1'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 백필 실행
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.quarters }}" ]; then
            ARGS="$ARGS --quarters ${{ inputs.quarters }}"
          fi
          if [ -n "${{ inputs.guru }}" ]; then
            ARGS="$ARGS --guru ${{ inputs.guru }}"
          fi
          if [ -n "${{ inputs.start_year }}" ]; then
            ARGS="$ARGS --start-year ${{ inputs.start_year }}"
          fi
          if [ -n "${{ inputs.end_quarter }}" ]; then
            ARGS="$ARGS --end-quarter ${{ inputs.end_quarter }}"
          fi
          python fetch_13f_history.py $ARGS

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "📊 13F 히스토리 백필"
            git pull --rebase origin main
            git push
          fi

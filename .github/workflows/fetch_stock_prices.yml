name: 종목 시세 업데이트

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 1-5'  # 미국 장 마감 후 (UTC 22시 = EST 17시)

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 시세 수집
        run: python fetch_stock_prices.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "💰 종목 시세 업데이트"
            git pull --rebase origin main
            git push
          fi

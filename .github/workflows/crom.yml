name: Buffett Archive Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-insider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_insider.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  fetch-vip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_vip.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  fetch-buyback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_buyback.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  fetch-market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_market.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

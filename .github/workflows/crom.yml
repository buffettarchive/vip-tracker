name: Buffett Archive Cron
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      fix_etc:
        description: '기타 항목만 재처리 (체크 시)'
        type: boolean
        default: false
jobs:
  fetch-insider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_insider.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
  fetch-vip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: |
          if [ "${{ inputs.fix_etc }}" = "true" ]; then
            python fetch_vip.py --fix-etc
          else
            python fetch_vip.py
          fi
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
  fetch-buyback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_buyback.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
  fetch-market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python fetch_market.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
